name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run lint
      - run: bun run format
      - run: bun test test/unit/
      - run: bun run build

      # Verify dist/ is up to date
      - name: Check dist/ is up to date
        run: |
          git diff --exit-code dist/ || (echo "dist/ is out of date. Run 'bun run build' and commit." && exit 1)
